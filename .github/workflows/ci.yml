name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: ruff + pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[assistant,dev]"

      - name: Ruff
        run: ruff check .

      - name: Tests
        # `python -m pytest` so the repo root is on sys.path: the app runs
        # `backend` from the source tree (pyproject packages=[]), it is never
        # installed into site-packages.
        run: python -m pytest -q
