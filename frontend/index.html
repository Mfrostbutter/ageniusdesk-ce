<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgeniusDesk</title>
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">Agenius<span class="logo-accent">Desk</span></h1>
      </div>

      <nav class="sidebar-nav">
        <!-- Group 1: Daily ops -->
        <div class="nav-group" data-group="daily-ops">
          <div class="nav-group-label" data-collapses="daily-ops">
            <span>Daily Ops</span>
            <svg class="group-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <button class="nav-btn active" data-view="dashboard" draggable="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Overview
          </button>
          <button class="nav-btn" data-view="workflows" draggable="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Workflows
          </button>
          <button class="nav-btn" data-view="errors" draggable="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Executions / Errors
            <span id="error-badge" class="badge hidden">0</span>
          </button>
          <button class="nav-btn" data-view="observe" title="Per-execution OpenTelemetry traces (node-by-node timing)" draggable="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Observe
          </button>
          <button class="nav-btn" data-view="instances" title="Manage connected n8n instances" draggable="true">
            <!-- Stacked-rectangles glyph reads as multiple connected instances. -->
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="5" rx="1"/><rect x="3" y="13" width="18" height="5" rx="1"/><circle cx="7" cy="6.5" r="0.5" fill="currentColor"/><circle cx="7" cy="15.5" r="0.5" fill="currentColor"/></svg>
            Instances
          </button>
          <button class="nav-btn" data-view="fleet" title="Workflow health across all instances" draggable="true">
            <!-- Heartbeat glyph: health across the fleet. -->
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h4l2 5 4-13 2 8h6"/></svg>
            Fleet Health
          </button>
          <button class="nav-btn" data-view="agent-fleet" title="LangGraph + PydanticAI agents: run, watch, approve" draggable="true">
            <!-- Branching nodes: an agent graph / a fleet of agents. -->
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="12" r="2.5"/><path d="M8.4 7 15.6 11"/><path d="M8.4 17 15.6 13"/></svg>
            Agent Fleet
          </button>
          <button class="nav-btn" data-view="containers" title="Docker container management" draggable="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
            Containers
          </button>
        </div>

        <!-- Group 2: Build / connect -->
        <div class="nav-group" data-group="build">
          <div class="nav-group-label" data-collapses="build">
            <span>Build / Connect</span>
            <svg class="group-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <button class="nav-btn" data-view="codelab" title="Write and test n8n Code-node JavaScript with AI help" draggable="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Code Lab
          </button>
          <!-- Harness — the workspace (files agents work within) + sources, connectors, instructions -->
          <button class="nav-btn" data-view="knowledge" title="The harness: workspace files, sources, connectors, and agent instructions" draggable="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 010 18"/><path d="M3 12h18"/><path d="M12 3a15 15 0 010 18"/></svg>
            Harness
          </button>
          <button class="nav-btn" data-view="ai-settings" title="Configure model provider, default model, system prompt" draggable="true">
            <!-- Sparkle: magic-wand vibe to signal model configuration. -->
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/></svg>
            Models
          </button>
          <button class="nav-btn" data-view="mcp-servers" title="MCP connections and available tools" draggable="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            MCP
          </button>
          <button class="nav-btn" data-view="secrets" title="Encrypted credential store" draggable="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            Secrets
          </button>
        </div>

        <!-- Group 3: Admin / system -->
        <div class="nav-group" data-group="admin-system">
          <div class="nav-group-label" data-collapses="admin-system">
            <span>Admin / System</span>
            <svg class="group-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <button class="nav-btn" data-view="insights" title="Execution analytics, success rates, busiest workflows, error trends" draggable="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            Insights
          </button>
          <button class="nav-btn" data-view="admin" draggable="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
            Admin
          </button>
          <button class="nav-btn" data-view="import" draggable="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Import
          </button>
          <button class="nav-btn" data-view="backup" draggable="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export / Backup
          </button>
          <button class="nav-btn" data-view="settings" title="Themes, error handler, and options">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            Settings
          </button>
        </div>
      </nav>

      <!-- Footer / aesthetic area (bottom of sidebar) -->
      <div class="sidebar-footer-area">
        <!-- Your Vibe moved here, next to Theme + Instances rather than
             alongside the Operations nav group. -->
        <div class="sidebar-footer-vibe">
          <button class="nav-btn" data-view="music">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>
            Your Vibe
          </button>
        </div>

        <!-- Theme selector -->
        <div class="sidebar-instances">
          <div class="instance-label">Theme</div>
          <select id="theme-select" style="width:100%;background:var(--bg-input);border:1px solid var(--border-dim);border-radius:var(--radius);color:var(--text-secondary);font-size:12px;padding:6px 10px;cursor:pointer;font-family:var(--font-body);margin:0">
          </select>
        </div>

        <!-- Instance selector -->
        <div class="sidebar-instances" id="instance-selector"></div>
      </div>
      <!-- Logged-in account + logout. Populated by app.js; stays empty for
           edge-identity / admin-token / login-disabled installs (no session). -->
      <div id="sidebar-account"></div>
      <div class="sidebar-footer">
        <span id="connection-status" class="status-dot offline"></span>
        <span class="sidebar-footer-text" id="conn-label">Disconnected</span>
      </div>
    </aside>

    <!-- Main content -->
    <div style="flex:1;display:flex;flex-direction:column;margin-left:var(--sidebar-width);height:100vh;min-width:0;min-height:0;overflow:hidden">
      <!-- Music Player Banner -->
      <div id="player-banner" style="flex:none"></div>
      <!-- Page content (scrolls internally so the player banner can't push views off-screen) -->
      <main id="app-content"></main>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Setup wizard: 5-step first-run flow. JS renders each step into #wizard-body. -->
  <div id="wizard-modal" class="modal hidden" onclick="if(event.target===this && window.__hasInstances)this.classList.add('hidden')">
    <div class="modal-content wizard-content">
      <div class="wizard-header">
        <div id="wizard-steps" class="wizard-steps"></div>
        <button class="btn btn-sm btn-ghost hidden" id="wizard-close-btn" onclick="document.getElementById('wizard-modal').classList.add('hidden')" style="font-size:18px;padding:4px 8px">&times;</button>
      </div>
      <div id="wizard-body"></div>
      <div class="wizard-footer">
        <button class="btn btn-ghost" id="wizard-back">&larr; Back</button>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-ghost" id="wizard-skip">Skip</button>
          <button class="btn btn-primary" id="wizard-next">Next &rarr;</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Simple add-instance modal (reused from settings + instance selector). -->
  <div id="setup-modal" class="modal hidden" onclick="if(event.target===this)window.__closeSetupModal()">
    <div class="modal-content">
      <div style="display:flex;justify-content:space-between;align-items:start">
        <div>
          <h2 style="margin-bottom:4px">Add n8n Instance</h2>
          <p style="color:var(--text-secondary);font-size:14px">Connect another n8n instance to this dashboard.</p>
        </div>
        <button class="btn btn-sm btn-ghost" id="setup-close-btn" onclick="window.__closeSetupModal()" style="font-size:18px;padding:4px 8px">&times;</button>
      </div>
      <form id="setup-form" style="margin-top:16px">
        <label>
          Instance Name
          <input type="text" id="setup-name" placeholder="e.g. Production, Staging, Dev" required>
        </label>
        <label>
          n8n URL
          <input type="url" id="setup-url" placeholder="https://your-n8n.example.com" required>
          <span id="setup-url-hint" style="display:none;font-size:12px;margin-top:4px;padding:6px 8px;border-radius:var(--radius);background:var(--warning-glow);color:var(--warning);border-left:3px solid var(--warning)">Inside Docker, localhost is the dashboard container, not your host. Use host.docker.internal:&lt;port&gt; (or the host's LAN IP) so the dashboard can reach n8n.</span>
        </label>
        <div style="margin-top:10px;margin-bottom:10px">
          <div id="setup-key-field"></div>
          <small style="display:block;margin-top:4px;color:var(--text-dim)"><a href="https://docs.n8n.io/api/authentication/" target="_blank">How to create an API key</a>. n8n Settings &rarr; API &rarr; Create API Key</small>
        </div>
        <div style="display:flex;gap:8px;margin-top:14px">
          <button type="button" class="btn" id="setup-cancel" style="flex:1;justify-content:center" onclick="window.__closeSetupModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="setup-submit" style="flex:1;justify-content:center">Connect</button>
        </div>
        <p id="setup-error" class="error-text hidden"></p>
      </form>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
